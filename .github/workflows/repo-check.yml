name: Repo Check

on:
  push:
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify core files exist
        run: |
          test -f README.md
          test -f SKILL.md
          test -f setup.md
          test -f operations.md
          test -f docs/install.md
          test -f docs/architecture.md
          test -f docs/faq.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f SECURITY.md

      - name: Verify README references key docs
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path("README.md").read_text()
          required = [
              "docs/install.md",
              "docs/architecture.md",
              "docs/faq.md",
              "CONTRIBUTING.md",
              "LICENSE",
              "SECURITY.md",
          ]

          missing = [item for item in required if item not in readme]
          if missing:
              raise SystemExit(f"Missing README references: {missing}")
          PY
